# HiveMind configuration
# Run with: docker compose up -d    (then open http://localhost:9090)
# Or locally: python -m hivemind serve --host 0.0.0.0

hives_dir: /home/fox/hive-data/hives
meta_graph_path: data/meta_graph.json
server:
  host: 127.0.0.1
  port: 9090

# Default owner for new hives (optional, can be overridden per-hive)
default_owner: "harish"

# Ollama integration for automatic concept definition generation
# These can also be set via environment variables:
#   USE_OLLAMA_DEFINITIONS=true   (or pass --ollama to the CLI)
#   OLLAMA_URL=http://localhost:11434
#   OLLAMA_MODEL=gemma4:31b-mlx
#   OLLAMA_TIMEOUT=30
ollama:
  enabled: true
  url: http://host.docker.internal:11434
  model: gemma4:31b-mlx
  timeout: 30
