<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiveMind Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg-sidebar: #161b22;
  --bg-toolbar: #161b22;
  --bg-card: #1c2128;
  --bg-card-hover: #21262d;
  --bg-card-active: #1c2a3a;
  --bg-input: #0d1117;
  --bg-legend: #161b22;
  --bg-tooltip: #1c2128;
  --bg-results: #161b22;
  --bg-result-hover: #1c2128;
  --text: #e1e4e8;
  --text-secondary: #8b949e;
  --text-title: #c9d1d9;
  --border: #30363d;
  --border-hover: #58a6ff;
  --accent: #58a6ff;
  --accent-green: #238636;
  --accent-green-hover: #2ea043;
  --accent-yellow: #d29922;
  --btn-bg: #21262d;
  --active-bg: #1f6feb;
  --active-color: #fff;
  --node-stroke: #fff;
  --node-stroke-hover: #58a6ff;
  --paper-color: #1f6feb;
  --concept-color: #238636;
  --graphref-color: #da3633;
  --edge-color: #636e7b;
}

html.light {
  --bg: #ffffff;
  --bg-sidebar: #f6f8fa;
  --bg-toolbar: #f6f8fa;
  --bg-card: #ffffff;
  --bg-card-hover: #f3f4f6;
  --bg-card-active: #ddf4ff;
  --bg-input: #ffffff;
  --bg-legend: #f6f8fa;
  --bg-tooltip: #ffffff;
  --bg-results: #f6f8fa;
  --bg-result-hover: #f3f4f6;
  --text: #1f2328;
  --text-secondary: #656d76;
  --text-title: #1f2328;
  --border: #d0d7de;
  --border-hover: #0969da;
  --accent: #0969da;
  --accent-green: #1a7f37;
  --accent-green-hover: #22863a;
  --accent-yellow: #9a6700;
  --btn-bg: #eaeef2;
  --active-bg: #0969da;
  --active-color: #fff;
  --node-stroke: #fff;
  --node-stroke-hover: #0969da;
  --paper-color: #0969da;
  --concept-color: #1a7f37;
  --graphref-color: #cf222e;
  --edge-color: #afb8c1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: background .3s, color .3s; }

#app { display: flex; height: 100vh; }

/* Sidebar */
#sidebar { width: 320px; min-width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: background .3s, border .3s; }
#sidebar h1 { font-size: 18px; padding: 16px 20px; border-bottom: 1px solid var(--border); color: var(--accent); letter-spacing: 0.5px; }
#sidebar h1 small { font-size: 11px; color: var(--text-secondary); font-weight: 400; display: block; margin-top: 2px; letter-spacing: 0; }

#hive-list { flex: 1; overflow-y: auto; padding: 8px; }
.hive-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; transition: all .15s; }
.hive-card:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.hive-card.active { border-color: var(--accent); background: var(--bg-card-active); }
.hive-card .name { font-size: 14px; font-weight: 600; color: var(--text-title); }
.hive-card .stats { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.hive-card .stats span { margin-right: 12px; }
.hive-card .stats .num { color: var(--accent); }

#status-bar { padding: 10px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); }

/* Main panel */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { padding: 8px 16px; background: var(--bg-toolbar); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; transition: background .3s, border .3s; }
#toolbar .title { font-size: 13px; font-weight: 600; color: var(--text-title); }
#toolbar .subtitle { font-size: 11px; color: var(--text-secondary); }
#search-box { margin-left: auto; display: flex; gap: 6px; }
#search-box input { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--text-title); font-size: 12px; width: 200px; outline: none; }
#search-box input:focus { border-color: var(--accent); }
#search-box button { background: var(--accent-green); border: none; border-radius: 6px; padding: 4px 12px; color: #fff; font-size: 12px; cursor: pointer; }
#search-box button:hover { background: var(--accent-green-hover); }
#view-toggle { display: flex; gap: 4px; }
#view-toggle button { background: var(--btn-bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; color: var(--text-secondary); font-size: 11px; cursor: pointer; }
#view-toggle button.active { background: var(--active-bg); border-color: var(--active-bg); color: var(--active-color); }

#graph-container { flex: 1; position: relative; overflow: hidden; }
#graph-container svg { width: 100%; height: 100%; }

/* Graph styles */
.node circle { stroke: var(--node-stroke); stroke-width: 1.5px; cursor: pointer; transition: r .15s; }
.node circle:hover { stroke: var(--node-stroke-hover); }
.node text { font-size: 11px; fill: var(--text-title); pointer-events: none; }
.node text.label { font-size: 11px; }
.node text.type-label { font-size: 8px; fill: var(--text-secondary); }

.link { stroke: var(--edge-color); stroke-opacity: 0.65; stroke-width: 1.5; }
.link.cross { stroke: var(--accent-yellow); stroke-dasharray: 4 3; }
.link.ref { stroke: var(--accent); stroke-width: 2; }

.link-label { font-size: 8px; fill: var(--text-secondary); }

/* Search results overlay */
#search-results { position: absolute; top: 0; right: 0; width: 360px; max-height: 100%; overflow-y: auto; background: var(--bg-results); border-left: 1px solid var(--border); display: none; }
#search-results.visible { display: block; }
#search-results .header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; color: var(--text-title); }
#search-results .result { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; color: var(--text); }
#search-results .result:hover { background: var(--bg-result-hover); }
#search-results .result .graph { color: var(--accent); font-size: 10px; }
#search-results .result .type { color: var(--accent-yellow); font-size: 10px; margin-left: 8px; }
#search-results .result .label { color: var(--text-title); margin-top: 2px; }

/* Tooltip */
#tooltip { position: absolute; background: var(--bg-tooltip); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none; display: none; z-index: 100; max-width: 300px; }
#tooltip .tt-name { font-weight: 600; color: var(--text-title); margin-bottom: 4px; }
#tooltip .tt-detail { color: var(--text-secondary); font-size: 11px; }

.hive-card .cross { color: var(--accent-yellow); }
.hive-action-btn { background:none; border:1px solid var(--border); border-radius:4px; padding:2px 6px; cursor:pointer; font-size:12px; line-height:1; color:var(--text-secondary); transition:all .15s; }
.hive-action-btn:hover { border-color:var(--accent); color:var(--accent); }

.sidebar-tab.active { color: var(--accent) !important; border-bottom-color: var(--accent) !important; }
.collection-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; transition: all .15s; }
.collection-card:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.collection-card .name { font-size: 14px; font-weight: 600; color: var(--text-title); }
.collection-card .desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.collection-card .stats { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.collection-card .stats .num { color: var(--accent); }
.collection-detail-hives { padding: 4px 0; }
.collection-detail-hive { display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:12px;border-radius:4px; }
.collection-detail-hive:hover { background:var(--bg-card-hover); }
.collection-detail-hive .name { flex:1; }
.collection-detail-hive .remove-btn { background:none;border:1px solid var(--border);border-radius:4px;padding:1px 6px;cursor:pointer;font-size:10px;color:var(--graphref-color); }
.collection-detail-hive .remove-btn:hover { border-color:var(--graphref-color); }
.add-to-coll-btn { background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px;color:var(--accent); }
.add-to-coll-btn:hover { border-color:var(--accent);background:var(--bg-card-active); }

.compare-overlap { padding:4px 0; }
.compare-overlap-item { padding:6px 8px; font-size:11px; border-radius:4px; margin-bottom:2px; }
.compare-overlap-item:hover { background:var(--bg-card-hover); }
.compare-overlap-item .concept-name { font-weight:600; color:var(--text-title); }
.compare-overlap-item .concept-hives { color:var(--text-secondary); font-size:10px; margin-top:2px; }
.compare-overlap-item .concept-hives span { display:inline-block; margin-right:4px; }

/* Legend */
#legend { position: absolute; bottom: 16px; left: 16px; background: var(--bg-legend); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; }
#legend .row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; color: var(--text-secondary); }
#legend .swatch { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,.2); }
#legend .swatch.paper { background: var(--paper-color); }
#legend .swatch.concept { background: var(--concept-color); }
#legend .swatch.graph-ref { background: var(--graphref-color); }

#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-secondary); font-size: 14px; }

#metric-select { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; color: var(--text-secondary); font-size: 11px; outline: none; cursor: pointer; }
#metric-select:hover { border-color: var(--accent); }



#config-btn { background:none; border:none; cursor:pointer; font-size:14px; padding:0 0 0 8px; color:var(--text-secondary); vertical-align:middle; line-height:1; }
#config-btn:hover { color:var(--accent); }
#config-panel { display:none; border-bottom:1px solid var(--border); background:var(--bg-card); }
#config-panel.open { display:block; }
#config-panel .config-header { padding:8px 16px; font-size:11px; font-weight:600; color:var(--text-secondary); border-bottom:1px solid var(--border); }
#config-list { padding:4px 8px; max-height:200px; overflow-y:auto; }
.config-row { display:flex; align-items:center; gap:8px; padding:4px 8px; font-size:12px; border-radius:4px; }
.config-row:hover { background:var(--bg-card-hover); }
.config-row label { flex:1; cursor:pointer; color:var(--text); }
.config-row input[type=checkbox] { accent-color:var(--accent); cursor:pointer; }

.theme-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-secondary); font-size: 1rem;
  transition: all .2s; padding: 0; line-height: 1;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Query panel */
#query-panel {
  position: absolute; top: 0; left: 0; right: 0;
  background: var(--bg-results); border-bottom: 1px solid var(--border);
  display: none; z-index: 50; max-height: 40%;
  overflow-y: auto;
}
#query-panel.visible { display: block; }
#query-panel .header {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 13px; color: var(--text-title);
}
#query-explanation {
  padding: 12px 16px; font-size: 13px; line-height: 1.6;
  color: var(--text);
}
#query-explanation strong { color: var(--accent); }
#query-explanation em { color: var(--accent-yellow); font-style: normal; }
#query-close {
  position: absolute; top: 8px; right: 12px;
  cursor: pointer; color: var(--text-secondary); font-size: 18px;
  line-height: 1; padding: 2px 6px; border-radius: 4px;
}
#query-close:hover { background: var(--bg-card-hover); color: var(--text); }

/* Ingest panel */
#ingest-panel {
  position: absolute; top: 0; left: 0; right: 0;
  background: var(--bg-results); border-bottom: 1px solid var(--border);
  display: none; z-index: 50; overflow-y: auto;
}
#ingest-panel.visible { display: block; }
#ingest-panel .header {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 13px; color: var(--text-title);
}
#ingest-panel .header.small { font-size: 12px; padding: 8px 16px; background: var(--bg-card); }
#ingest-close {
  position: absolute; top: 8px; right: 12px;
  cursor: pointer; color: var(--text-secondary); font-size: 18px;
  line-height: 1; padding: 2px 6px; border-radius: 4px;
}
#ingest-close:hover { background: var(--bg-card-hover); color: var(--text); }

/* Toast */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 16px; font-size: 13px;
  color: var(--text); box-shadow: 0 4px 12px rgba(0,0,0,.4);
  transform: translateY(20px); opacity: 0;
  transition: transform .25s ease, opacity .25s ease;
  pointer-events: none; max-width: 360px;
}
#toast.visible { transform: translateY(0); opacity: 1; }
#toast .toast-ok { color: var(--accent-green); }
#toast .toast-warn { color: var(--accent-yellow); }
#toast .toast-err { color: var(--graphref-color); }

#ingest-form, #ingest-bulk { padding: 12px 16px; }
.ingest-row { margin-bottom: 10px; }
.ingest-row label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.ingest-row label .opt { font-style: italic; }
.ingest-row input, .ingest-row textarea, .ingest-row select {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; color: var(--text-title);
  font-size: 12px; outline: none; font-family: inherit;
}
.ingest-row input:focus, .ingest-row textarea:focus, .ingest-row select:focus {
  border-color: var(--accent);
}
.ingest-actions { display: flex; gap: 8px; margin-top: 10px; }
.ingest-actions button {
  background: var(--btn-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 14px; color: var(--text);
  font-size: 12px; cursor: pointer; transition: all .15s;
}
.ingest-actions button:hover { border-color: var(--accent); }
.ingest-actions button.primary { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
.ingest-actions button.primary:hover { background: var(--accent-green-hover); }
.ingest-divider { border-top: 1px solid var(--border); }
#ingest-result, #ingest-extracted {
  margin-top: 10px; font-size: 12px; line-height: 1.5;
}
#ingest-result .ok { color: var(--accent-green); }
#ingest-result .warn { color: var(--accent-yellow); }
#ingest-result .err { color: var(--graphref-color); }
</style>
</head>
<body>
<div id="app">
    <div id="sidebar">
      <h1>🐝 HiveMind
        <small>federated knowledge graphs</small>
        <button id="config-btn" title="Configure hive visibility">⚙️</button>
      </h1>
      <div id="config-panel">
        <div class="config-header">Hive Visibility</div>
        <div id="config-list"></div>
      </div>
      <div id="sidebar-tabs" style="display:flex;border-bottom:1px solid var(--border);">
        <button class="sidebar-tab active" data-tab="hives" style="flex:1;background:none;border:none;padding:8px;color:var(--text-secondary);font-size:11px;cursor:pointer;border-bottom:2px solid transparent;">Hives</button>
        <button class="sidebar-tab" data-tab="collections" style="flex:1;background:none;border:none;padding:8px;color:var(--text-secondary);font-size:11px;cursor:pointer;border-bottom:2px solid transparent;">Collections</button>
      </div>
      <div id="hive-header" style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;">
        <span style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;">Hives</span>
        <button id="new-hive-btn" style="background:var(--accent-green);border:none;border-radius:4px;padding:2px 8px;color:#fff;font-size:10px;cursor:pointer;">+ New</button>
      </div>
      <div id="hive-list"></div>
      <div id="collection-list" style="display:none;flex:1;overflow-y:auto;padding:8px;"></div>
      <div id="status-bar"></div>
    </div>
  <div id="main">
    <div id="toolbar">
      <div class="title" id="view-title">Meta-Graph</div>
      <div class="subtitle" id="view-subtitle">all hives</div>
      <div id="view-toggle">
        <button class="active" data-view="meta">Meta</button>
        <button data-view="unified">Unified</button>
      </div>
      <select id="metric-select">
        <option value="cosine">cosine</option>
        <option value="euclidean">euclidean</option>
        <option value="manhattan">manhattan</option>
        <option value="dot">dot</option>
      </select>
      <button class="theme-btn" id="theme-toggle" title="Toggle theme">&#9788;</button>
      <button id="ingest-btn" style="background:var(--accent-yellow);border:none;border-radius:6px;padding:4px 12px;color:#fff;font-size:11px;cursor:pointer;">+ Concept</button>
      <button id="visualize-btn" style="background:var(--paper-color);border:none;border-radius:6px;padding:4px 12px;color:#fff;font-size:11px;cursor:pointer;display:none;">Visualize</button>
      <button id="compare-btn" style="background:var(--accent);border:none;border-radius:6px;padding:4px 12px;color:#fff;font-size:11px;cursor:pointer;display:none;">Compare</button>
      <div id="search-box">
        <input id="query-input" placeholder="Ask a question..." title="e.g. How is Photonic computing related to AI acceleration?" />
        <button id="query-btn">Ask</button>
      </div>
    </div>
    <div id="graph-container">
      <svg></svg>
      <div id="loading">Loading graph...</div>
      <div id="tooltip"></div>
      <div id="legend">
        <div class="row"><span class="swatch paper"></span> Paper</div>
        <div class="row"><span class="swatch concept"></span> Concept</div>
        <div class="row"><span class="swatch graph-ref"></span> Graph Ref</div>
        <div class="row">--- cross edge</div>
      </div>
      <div id="search-results">
        <div class="header">Search Results</div>
      </div>
      <div id="query-panel">
        <div class="header">Query Result</div>
        <div id="query-explanation"></div>
        <div id="query-close" title="Close">&times;</div>
      </div>
      <div id="toast"></div>
      <div id="ingest-panel">
        <div class="header">Add New Concept</div>
        <div id="ingest-close" title="Close">&times;</div>
        <div id="ingest-form">
          <div class="ingest-row">
            <label>Keyword</label>
            <input id="ingest-keyword" placeholder="e.g. Differentiable Programming" />
          </div>
          <div class="ingest-row">
            <label>Definition <span class="opt">(optional)</span></label>
            <textarea id="ingest-definition" rows="2" placeholder="Brief description..."></textarea>
          </div>
          <div class="ingest-row">
            <label>Target Hive</label>
            <select id="ingest-hive"><option value="">— auto-suggest —</option></select>
          </div>
          <div class="ingest-row">
            <label>Connect to <span class="opt">(optional)</span></label>
            <input id="ingest-connect" placeholder="Existing concept names, comma-separated" />
          </div>
          <div class="ingest-actions">
            <button id="ingest-suggest-btn">Suggest Hive</button>
            <button id="ingest-add-btn" class="primary">Add Concept</button>
          </div>
          <div id="ingest-result"></div>
        </div>
        <div class="ingest-divider"></div>
        <div class="header small">Bulk Extract from Text</div>
        <div id="ingest-bulk">
          <textarea id="ingest-text" rows="3" placeholder="Paste paper abstract / text to extract keywords from..."></textarea>
          <div class="ingest-actions">
            <button id="ingest-extract-btn">Extract Keywords</button>
            <button id="ingest-bulk-add-btn" class="primary">Add All</button>
          </div>
          <div id="ingest-extracted"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = d3.scaleOrdinal(d3.schemeCategory10);

let state = {
  view: 'meta',
  selectedHive: null,
  selectedHives: new Set(),
  metaGraph: { nodes: [], edges: [] },
  hives: [],
};

// ---- API ----
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${r.status}: ${r.statusText}`);
  }
  return r.json();
}

// ---- New Hive ----
document.getElementById('new-hive-btn')?.addEventListener('click', async () => {
  const name = prompt('New hive name:');
  if (!name || !name.trim()) return;
  try {
    const r = await fetch('/api/hives', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name.trim()}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed to create hive');
    showToast(`Created hive "${name.trim()}"`, 'ok');
    loadHives();
    refreshGraphs();
  } catch (err) {
    showToast('Error: ' + err.message, 'err');
  }
});

// ---- Sidebar tabs ----
document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const view = tab.dataset.tab;
    document.getElementById('hive-list').style.display = view === 'hives' ? '' : 'none';
    document.getElementById('collection-list').style.display = view === 'collections' ? '' : 'none';
    if (view === 'collections') loadCollections();
  });
});

// ---- Render ----
function render() {
  if (state.view === 'meta') renderMetaGraph();
  else if (state.view === 'unified') renderUnifiedGraph();
}

function getOrCreateSvg() {
  let svg = d3.select('#graph-container svg');
  if (svg.empty()) {
    const container = document.getElementById('graph-container');
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    container.insertBefore(s, container.firstChild);
    svg = d3.select(s);
  }
  return svg;
}

function renderMetaGraph() {
  const container = document.getElementById('graph-container');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const svg = getOrCreateSvg();
  svg.selectAll('*').remove();
  svg.attr('width', width).attr('height', height).attr('viewBox', [0, 0, width, height]);
  document.getElementById('view-title').textContent = 'Meta-Graph';
  document.getElementById('view-subtitle').textContent = `${state.metaGraph.nodes.length} hives`;

  if (!state.metaGraph.nodes.length) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = 'No hives found. Create one with: hivemind init <name>';
    return;
  }
  document.getElementById('loading').style.display = 'none';

  const g = svg.append('g');

  const simulation = d3.forceSimulation(state.metaGraph.nodes)
    .force('link', d3.forceLink(state.metaGraph.edges).id(d => d.id).distance(180))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(60));

  const link = g.append('g')
    .selectAll('line')
    .data(state.metaGraph.edges)
    .join('line')
    .attr('class', 'link ref')
    .attr('stroke-opacity', 0.6);

  const linkLabel = g.append('g')
    .selectAll('text')
    .data(state.metaGraph.edges)
    .join('text')
    .attr('class', 'link-label')
    .text(d => d.relation)
    .attr('dy', -4);

  const node = g.append('g')
    .selectAll('g')
    .data(state.metaGraph.nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle')
    .attr('r', d => 20 + Math.min(d.papers || 0, 30))
    .attr('fill', d => COLORS(d.id))
    .on('click', (e, d) => {
      e.stopPropagation();
      state.selectedHive = d.id;
      loadHiveGraph(d.id);
    })
    .on('mouseover', (e, d) => showTooltip(e, `<strong>${d.label}</strong><br>${d.papers} papers, ${d.concepts} concepts, ${d.relations} relations`))
    .on('mouseout', hideTooltip);

  node.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', 4)
    .attr('class', 'label')
    .text(d => d.label.length > 18 ? d.label.slice(0, 16) + '…' : d.label);

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkLabel.attr('x', d => (d.source.x + d.target.x) / 2)
             .attr('y', d => (d.source.y + d.target.y) / 2);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function renderUnifiedGraph() {
  document.getElementById('view-title').textContent = 'Unified Knowledge Graph';
  document.getElementById('view-subtitle').textContent = 'all nodes across all hives';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'Loading unified graph...';

  const visibleHives = state.hives.filter(h => h.visible !== false);
  if (!visibleHives.length) {
    document.getElementById('loading').textContent = 'No visible hives. Toggle visibility in the sidebar.';
    return;
  }
  Promise.all(visibleHives.map(h => api(`/api/hive/${encodeURIComponent(h.id)}`)))
    .then(hiveData => {
      const allNodes = [];
      const allEdges = [];
      const nodeMap = new Map();

      hiveData.forEach((hd, i) => {
        const prefix = hd.id;
        hd.nodes.forEach(n => {
          const uid = `${prefix}:${n.id}`;
          if (!nodeMap.has(uid)) {
            nodeMap.set(uid, { ...n, uid, label: n.label, graphId: prefix });
            allNodes.push(nodeMap.get(uid));
          }
        });
        hd.edges.forEach(e => {
          const suid = `${prefix}:${e.source}`;
          const tuid = `${e.target_graph || prefix}:${e.target}`;
          if (nodeMap.has(suid) && nodeMap.has(tuid)) {
            allEdges.push({ ...e, source: suid, target: tuid });
          }
        });
      });

      renderD3Graph(allNodes, allEdges, true);
      document.getElementById('loading').style.display = 'none';
    }).catch(err => {
      document.getElementById('loading').textContent = 'Error: ' + err.message;
    });
}

function renderD3Graph(nodes, edges, unified = false) {
  const container = document.getElementById('graph-container');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const svg = getOrCreateSvg();
  svg.selectAll('*').remove();
  svg.attr('width', width).attr('height', height).attr('viewBox', [0, 0, width, height]);

  if (!nodes.length) return;

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.1, 8]).on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(zoom);

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.uid || d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(25));

  const link = g.append('g')
    .selectAll('line')
    .data(edges)
    .join('line')
    .attr('class', d => {
      if (d.cross_graph || (d.target_graph && d.target_graph !== d.source_graph)) return 'link cross';
      return 'link';
    })
    .attr('stroke-opacity', 0.3);

  const node = g.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  const radiusMap = { paper: 8, concept: 10, graph_ref: 14 };
  const computedStyle = getComputedStyle(document.documentElement);
  function cssVar(name) { return computedStyle.getPropertyValue(name).trim(); }

  node.append('circle')
    .attr('r', d => {
      if (d.shared) return (radiusMap[d.type] || 8) + 2;
      return radiusMap[d.type] || 8;
    })
    .attr('fill', d => {
      if (d.graphId && unified) return COLORS(d.graphId);
      if (d.type === 'paper') return cssVar('--paper-color') || '#1f6feb';
      if (d.type === 'concept') return cssVar('--concept-color') || '#238636';
      if (d.type === 'graph_ref') return cssVar('--graphref-color') || '#da3633';
      return '#8b949e';
    })
    .attr('stroke', d => d.shared ? '#ffd700' : cssVar('--node-stroke'))
    .attr('stroke-width', d => d.shared ? 4 : 1.5)
    .on('click', (e, d) => {
      e.stopPropagation();
      if (d.type === 'graph_ref') {
        const tgt = d.target_graph_id || d.id.replace('graph_ref:', '');
        if (tgt) loadHiveGraph(tgt);
      }
    })
    .on('mouseover', (e, d) => {
      let html = `<strong>${d.label}</strong><br>type: ${d.type}`;
      if (d.graphId) html += `<br>hive: ${d.graphId}`;
      if (d.shared) html += `<br><span style="color:#ffd700;">★ Shared across hives</span>`;
      if (d.type === 'paper') {
        if (d.authors) html += `<br><em>${d.authors}</em>`;
        if (d.abstract) html += `<br><span style="font-size:10px;color:var(--text-secondary)">${d.abstract.slice(0, 200)}…</span>`;
        if (d.arxiv_id) html += `<br><a href="https://arxiv.org/abs/${d.arxiv_id}" target="_blank" style="color:var(--accent);font-size:11px;">arxiv:${d.arxiv_id}</a>`;
      }
      if (d.type === 'concept' && d.definition) {
        html += `<br><em>${d.definition.slice(0, 150)}</em>`;
      }
      showTooltip(e, html);
    })
    .on('mouseout', hideTooltip);

  node.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', d => -(radiusMap[d.type] || 8) - 4)
    .attr('class', 'label')
    .text(d => d.label.length > 20 ? d.label.slice(0, 18) + '…' : d.label);

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ---- Hive list ----
function loadHives() {
  api('/api/hives').then(hives => {
    state.hives = hives;
    const list = document.getElementById('hive-list');
    list.innerHTML = '';
    hives.filter(h => h.visible !== false).forEach(h => {
      const card = document.createElement('div');
      card.className = 'hive-card' + (state.selectedHive === h.id ? ' active' : '');
      const checked = state.selectedHives.has(h.id) ? 'checked' : '';
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" class="hive-select" data-hive="${h.id}" ${checked} style="accent-color:var(--accent);cursor:pointer;" title="Select for comparison">
          <div style="flex:1;">
            <div class="name">${h.id}</div>
            <div class="stats">
              <span>📄 <span class="num">${h.papers}</span></span>
              <span>🧠 <span class="num">${h.concepts}</span></span>
              <span>🔗 <span class="num">${h.relations}</span></span>
              ${h.graph_refs ? `<span class="cross">↗ <span class="num">${h.graph_refs}</span></span>` : ''}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:4px;margin-top:4px;margin-left:24px;">
          <button class="hive-action-btn" data-action="embed" data-hive="${h.id}" title="Generate vector embeddings">🧠</button>
          <button class="hive-action-btn" data-action="history" data-hive="${h.id}" title="Backup history">📋</button>
          <button class="hive-action-btn" data-action="export" data-hive="${h.id}" title="Export as JSON-LD">📦</button>
          <button class="hive-action-btn" data-action="fetch" data-hive="${h.id}" title="Fetch more arxiv papers on this topic">📡</button>
        </div>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.closest('.hive-action-btn')) return;
        if (e.target.closest('.hive-select')) return;
        loadHiveGraph(h.id);
      });
      const cb = card.querySelector('.hive-select');
      cb.addEventListener('change', () => {
        if (cb.checked) state.selectedHives.add(h.id);
        else state.selectedHives.delete(h.id);
        const n = state.selectedHives.size;
        document.getElementById('visualize-btn').style.display = n >= 1 ? '' : 'none';
        document.getElementById('compare-btn').style.display = n >= 2 ? '' : 'none';
      });
      list.appendChild(card);
    });
    // Prune selectedHives of removed hives
    const activeIds = new Set(hives.map(h => h.id));
    for (const hid of state.selectedHives) {
      if (!activeIds.has(hid)) state.selectedHives.delete(hid);
    }
    document.getElementById('visualize-btn').style.display = state.selectedHives.size >= 1 ? '' : 'none';
    document.getElementById('compare-btn').style.display = state.selectedHives.size >= 2 ? '' : 'none';
    const visibleCount = hives.filter(h => h.visible !== false).length;
    document.getElementById('status-bar').textContent =
      `${visibleCount}/${hives.length} hives · ${hives.reduce((a, h) => a + h.papers, 0)} papers · ${hives.reduce((a, h) => a + h.concepts, 0)} concepts`;
  }).catch(err => {
    document.getElementById('status-bar').textContent = 'Error loading hives: ' + err.message;
  });
}

    list.innerHTML = '';

    header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';

        fetch('/api/collections', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: name.trim()}),

async function showCollectionDetail(cid) {
  try {
    const c = await api(`/api/collection/${encodeURIComponent(cid)}`);
    const panel = document.getElementById('query-panel');
    const expl = document.getElementById('query-explanation');
    let html = `<div style="padding:8px 12px;font-size:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <strong style="font-size:14px;">${c.name}</strong>
        <button id="coll-delete-btn" data-id="${c.id}" style="background:none;border:1px solid var(--graphref-color);border-radius:4px;padding:2px 8px;cursor:pointer;color:var(--graphref-color);font-size:10px;">Delete</button>
      </div>`;
    if (c.description) html += `<div style="color:var(--text-secondary);margin-bottom:8px;">${c.description}</div>`;
    html += `<div style="color:var(--text-secondary);font-size:10px;margin-bottom:8px;">Created: ${c.created_at} &middot; Updated: ${c.updated_at}</div>`;
    html += `<div style="font-weight:600;margin-bottom:4px;">Hives (${c.hives.length})</div>
      <div class="collection-detail-hives">`;
    if (!c.hives.length) {
      html += '<div style="color:var(--text-secondary);font-style:italic;padding:4px 8px;">No hives in this collection.</div>';
    } else {
      c.hives.forEach(h => {
        html += `<div class="collection-detail-hive">
          <span class="name">${h.id}</span>
          <span style="color:var(--text-secondary);font-size:10px;">${h.papers}p ${h.concepts}c</span>
          <button class="remove-from-coll-btn" data-collection="${c.id}" data-hive="${h.id}" title="Remove from collection">&times;</button>
        </div>`;
      });
    }
    html += '</div>';
    if (state.hives.length > c.hives.length) {
      const available = state.hives.filter(h => !c.hives.some(ch => ch.id === h.id) && h.visible !== false);
      if (available.length) {
        html += `<div style="margin-top:8px;">
          <select id="coll-add-select" style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text-title);font-size:11px;outline:none;">
            <option value="">— Add a hive —</option>
            ${available.map(h => `<option value="${h.id}">${h.id}</option>`).join('')}
          </select>
        </div>`;
      }
    }
    html += '</div>';
    expl.innerHTML = html;
    panel.classList.add('visible');

    document.getElementById('coll-delete-btn')?.addEventListener('click', async () => {
      if (!confirm(`Delete collection "${c.name}"?`)) return;
      await fetch(`/api/collection/${encodeURIComponent(c.id)}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'delete'}),
      });
      panel.classList.remove('visible');
      loadCollections();
      showToast(`Deleted collection "${c.name}"`, 'ok');
    });

    document.querySelectorAll('.remove-from-coll-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const colId = btn.dataset.collection;
        const hiveId = btn.dataset.hive;
        await fetch(`/api/collection/${encodeURIComponent(colId)}/hives`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action: 'remove', hive_id: hiveId}),
        });
        showCollectionDetail(colId);
        showToast(`Removed ${hiveId} from collection`, 'ok');
      });
    });

    const addSelect = document.getElementById('coll-add-select');
    if (addSelect) {
      addSelect.addEventListener('change', async () => {
        const hiveId = addSelect.value;
        if (!hiveId) return;
        await fetch(`/api/collection/${encodeURIComponent(c.id)}/hives`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action: 'add', hive_id: hiveId}),
        });
        showCollectionDetail(c.id);
        showToast(`Added ${hiveId} to collection`, 'ok');
      });
    }
  } catch (err) {
    showToast('Failed to load collection: ' + err.message, 'err');
  }
}

    hiveData.forEach((hd) => {
      const prefix = hd.id;
      hd.nodes.forEach(n => {
        const uid = `${prefix}:${n.id}`;

          nodeMap.set(uid, { ...n, uid, label: n.label, graphId: prefix });
          allNodes.push(nodeMap.get(uid));
        }
      });
      hd.edges.forEach(e => {
        const suid = `${prefix}:${e.source}`;
        const tuid = `${e.target_graph || prefix}:${e.target}`;

// ---- Compare ----
document.getElementById('compare-btn').addEventListener('click', async () => {
  const hives = Array.from(state.selectedHives);
  if (hives.length < 2) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'Comparing hives...';
  try {
    const result = await api(`/api/compare?hives=${hives.map(encodeURIComponent).join(',')}`);
    document.getElementById('loading').style.display = 'none';
    const panel = document.getElementById('query-panel');
    const expl = document.getElementById('query-explanation');
    let html = '<div style="padding:8px 12px;font-size:12px;">';

    // Chain
    html += `<div style="margin-bottom:8px;"><strong>Comparison chain:</strong> ${result.chain.map(h => `<span style="color:var(--accent);font-weight:600;">${h}</span>`).join(' → ')}</div>`;

    // Overlaps
    if (result.overlaps && result.overlaps.length) {
      html += `<div style="margin-bottom:8px;">
        <strong>Overlapping concepts (${result.overlap_count}):</strong>
        <div class="compare-overlap">`;
      result.overlaps.slice(0, 20).forEach(o => {
        const hivesStr = o.occurrences.map(e => `<span style="color:${COLORS(e.hive_id)}">${e.hive_id}</span>`).join(', ');
        html += `<div class="compare-overlap-item">
          <div class="concept-name">${o.concept}</div>
          <div class="concept-hives">in ${hivesStr}</div>
        </div>`;
      });
      if (result.overlap_count > 20) html += `<div style="color:var(--text-secondary);font-style:italic;padding:4px 8px;">...and ${result.overlap_count - 20} more</div>`;
      html += '</div></div>';
    } else {
      html += '<div style="margin-bottom:8px;color:var(--text-secondary);font-style:italic;">No overlapping concepts found between these hives.</div>';
    }

    // Relations
    if (result.explanation) {
      html += `<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px;">${result.explanation}</div>`;
    }

    html += '</div>';
    expl.innerHTML = html;
    panel.classList.add('visible');

    // Render the combined graph
    if (result.nodes && result.nodes.length) {
      document.getElementById('view-title').textContent = `Compare: ${hives.join(' vs ')}`;
      document.getElementById('view-subtitle').textContent = `${result.nodes.length} nodes, ${result.edges.length} edges, ${result.overlap_count} overlaps`;
      renderD3Graph(result.nodes, result.edges, true);

      // Add overlap toggle into the query-panel header
      const panelHeader = panel.querySelector('.header');
      if (result.overlap_nodes && result.overlap_nodes.length) {
        const toggleBtn = document.createElement('button');
        toggleBtn.textContent = 'Show overlaps only';
        toggleBtn.style.cssText = 'background:var(--accent-yellow);border:none;border-radius:4px;padding:2px 10px;color:#fff;font-size:10px;cursor:pointer;margin-left:12px;';
        let showingOverlapsOnly = false;
        toggleBtn.addEventListener('click', () => {
          showingOverlapsOnly = !showingOverlapsOnly;
          if (showingOverlapsOnly) {
            renderD3Graph(result.overlap_nodes, result.overlap_edges, true);
            toggleBtn.textContent = 'Show all nodes';
            document.getElementById('view-subtitle').textContent = `${result.overlap_nodes.length} overlap nodes, ${result.overlap_edges.length} edges`;
          } else {
            renderD3Graph(result.nodes, result.edges, true);
            toggleBtn.textContent = 'Show overlaps only';
            document.getElementById('view-subtitle').textContent = `${result.nodes.length} nodes, ${result.edges.length} edges, ${result.overlap_count} overlaps`;
          }
        });
        panelHeader.appendChild(toggleBtn);
      }
      showToast(`Compare: ${result.nodes.length} nodes, ${result.overlap_count} overlapping concepts`, 'ok');
    }
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    showToast('Compare failed: ' + err.message, 'err');
  }
});

// ---- Query ----
document.getElementById('query-btn').addEventListener('click', () => {
  const q = document.getElementById('query-input').value.trim();
  if (!q) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'Querying...';
  api(`/api/query?q=${encodeURIComponent(q)}`).then(result => {
    document.getElementById('loading').style.display = 'none';
    const panel = document.getElementById('query-panel');
    const expl = document.getElementById('query-explanation');
    expl.innerHTML = result.explanation || 'No results.';
    panel.classList.add('visible');

    if (result.nodes && result.nodes.length) {
      renderD3Graph(result.nodes, result.edges);
      document.getElementById('view-title').textContent = `Query: ${result.source} ↔ ${result.target}`;
      document.getElementById('view-subtitle').textContent = `${result.nodes.length} nodes, ${result.edges.length} edges`;
      showToast(`Query found ${result.nodes.length} nodes, ${result.edges.length} edges`, 'ok');
    } else {
      showToast('Query returned no results', 'warn');
    }
  }).catch(err => {
    document.getElementById('loading').style.display = 'none';
    showToast('Query failed: ' + err.message, 'err');
  });
});

document.getElementById('query-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('query-btn').click();
});

document.getElementById('query-close').addEventListener('click', () => {
  document.getElementById('query-panel').classList.remove('visible');
});

// ---- Tooltip ----
function showTooltip(e, html) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = html;
  tt.style.display = 'block';
  const rect = document.getElementById('graph-container').getBoundingClientRect();
  tt.style.left = (e.pageX - rect.left + 12) + 'px';
  tt.style.top = (e.pageY - rect.top - 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ---- View toggle ----
document.querySelectorAll('#view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    if (state.view === 'meta') {
      api('/api/meta-graph').then(mg => {
        state.metaGraph = mg;
        render();
      }).catch(err => {
        document.getElementById('loading').textContent = 'Error: ' + err.message;
      });
    } else if (state.view === 'unified') {
      if (state.selectedHive) loadHiveGraph(state.selectedHive);
      else renderUnifiedGraph();
    }
  });
});

// ---- Config panel ----
document.getElementById('config-btn').addEventListener('click', () => {
  const panel = document.getElementById('config-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) populateConfig();
});

function populateConfig() {
  const list = document.getElementById('config-list');
  list.innerHTML = '';
  state.hives.forEach(h => {
    const row = document.createElement('div');
    row.className = 'config-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = h.visible !== false;
    cb.addEventListener('change', async () => {
      await fetch(`/api/hive/${h.id}/visibility`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({visible: cb.checked}),
      });
      loadHives();
      refreshGraphs();
    });
    const label = document.createElement('label');
    label.textContent = h.id;
    row.appendChild(cb);
    row.appendChild(label);
    list.appendChild(row);
  });
}

// ---- Toast ----
function showToast(msg, type) {
  const t = document.getElementById('toast');
  const icon = type === 'ok' ? '✓' : type === 'warn' ? '~' : '✗';
  t.innerHTML = `<span class="toast-${type}">${icon}</span> ${msg}`;
  t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('visible'), 3000);
}

// ---- Ingest ----
document.getElementById('ingest-btn').addEventListener('click', () => {
  const panel = document.getElementById('ingest-panel');
  const sel = document.getElementById('ingest-hive');
  // populate hive dropdown
  sel.innerHTML = '<option value="">— auto-suggest —</option>';
  state.hives.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h.id; opt.textContent = h.id;
    sel.appendChild(opt);
  });
  panel.classList.toggle('visible');
  document.getElementById('ingest-keyword').focus();
});

document.getElementById('ingest-close').addEventListener('click', () => {
  document.getElementById('ingest-panel').classList.remove('visible');
});

document.getElementById('ingest-suggest-btn').addEventListener('click', async () => {
  const kw = document.getElementById('ingest-keyword').value.trim();
  if (!kw) return;
  const res = await api(`/api/suggest-concepts?keyword=${encodeURIComponent(kw)}`);
  const div = document.getElementById('ingest-result');
  if (!res.suggestions || !res.suggestions.length) {
    div.innerHTML = '<span class="warn">No matching hives found.</span>';
    return;
  }
  let html = '<div class="ok"><strong>Suggested hives:</strong></div>';
  res.suggestions.forEach(s => {
    html += `<div>• ${s.graph_id} (score: ${s.score}${s.existing_concept ? ', already exists' : ''})</div>`;
  });
  if (res.similar && res.similar.length) {
    html += '<div style="margin-top:4px"><strong>Similar existing concepts:</strong></div>';
    res.similar.slice(0, 4).forEach(s => {
      html += `<div>• ${s.label} (in ${s.graph_id}, score ${s.score})</div>`;
    });
  }
  div.innerHTML = html;
});

document.getElementById('ingest-add-btn').addEventListener('click', async () => {
  const keyword = document.getElementById('ingest-keyword').value.trim();
  if (!keyword) return;
  const definition = document.getElementById('ingest-definition').value.trim();
  const hive = document.getElementById('ingest-hive').value || null;
  const connectRaw = document.getElementById('ingest-connect').value.trim();
  const connectTo = connectRaw ? connectRaw.split(',').map(s => s.trim()).filter(Boolean) : null;

  const res = await fetch('/api/ingest', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ keyword, definition, hive, connect_to: connectTo }),
  });
  const data = await res.json();
  const div = document.getElementById('ingest-result');
  let html = '';
  (data.results || []).forEach(r => {
    if (r.status === 'added') {
      html += `<div class="ok">✓ ${r.message}</div>`;
      showToast(r.message, 'ok');
    } else if (r.status === 'skipped') {
      html += `<div class="warn">~ ${r.message}</div>`;
      showToast(r.message, 'warn');
    } else {
      html += `<div class="err">✗ ${r.message}</div>`;
      showToast(r.message, 'err');
    }
    if (r.similar && r.similar.length) {
      html += `<div style="margin-left:12px;font-size:11px;color:var(--text-secondary)">Similar: ${r.similar.map(s => s.label).join(', ')}</div>`;
    }
  });
  div.innerHTML = html || '<span class="err">No results</span>';
  // refresh hive list
  loadHives();
  if (state.selectedHive) loadHiveGraph(state.selectedHive);
});

document.getElementById('ingest-extract-btn').addEventListener('click', async () => {
  const text = document.getElementById('ingest-text').value.trim();
  if (!text) return;
  const res = await api(`/api/extract-keywords?text=${encodeURIComponent(text)}`);
  const div = document.getElementById('ingest-extracted');
  if (!res.keywords || !res.keywords.length) {
    div.innerHTML = '<span class="warn">No keywords extracted.</span>';
    return;
  }
  let html = '<div class="ok"><strong>Extracted keywords:</strong></div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">';
  res.keywords.forEach(kw => {
    html += `<span style="background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;">${kw}</span>`;
  });
  html += '</div>';
  div.innerHTML = html;
  document.getElementById('ingest-extracted').dataset.keywords = JSON.stringify(res.keywords);
});

document.getElementById('ingest-bulk-add-btn').addEventListener('click', async () => {
  const raw = document.getElementById('ingest-extracted').dataset.keywords;
  if (!raw) return;
  const keywords = JSON.parse(raw);
  const hive = document.getElementById('ingest-hive').value || null;
  const div = document.getElementById('ingest-extracted');
  div.innerHTML = '<span>Adding concepts...</span>';
  const res = await fetch('/api/ingest', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      text: keywords.join(', '),
      hive,
    }),
  });
  const data = await res.json();
  let html = '';
  let added = 0, skipped = 0;
  (data.results || []).forEach(r => {
    if (r.status === 'added') { added++; html += `<div class="ok">✓ ${r.message}</div>`; }
    else if (r.status === 'skipped') { skipped++; html += `<div class="warn">~ ${r.message}</div>`; }
  });
  div.innerHTML = html || '<span class="warn">No new concepts added.</span>';
  if (added) showToast(`Added ${added} concept(s)`, 'ok');
  if (skipped) showToast(`Skipped ${skipped} existing concept(s)`, 'warn');
  loadHives();
  if (state.selectedHive) loadHiveGraph(state.selectedHive);
});

// ---- SSE live sync ----
(function() {
  const evtSrc = new EventSource('/api/events');
  evtSrc.addEventListener('hive-update', () => {
    // Refresh when data changes
    api('/api/meta-graph').then(mg => { state.metaGraph = mg; }).catch(() => {});
    api('/api/hives').then(hives => { state.hives = hives; loadHives(); }).catch(() => {});
    if (state.selectedHive) loadHiveGraph(state.selectedHive);
  });
  evtSrc.addEventListener('collection-update', () => {
    if (document.getElementById('collection-list').style.display !== 'none') {
      loadCollections();
    }
  });
  evtSrc.onerror = () => console.warn('SSE connection lost, will retry...');
})();

// ---- Hive action buttons: history & export ----
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.hive-action-btn');
  if (!btn) return;
  e.stopPropagation();
  const hive = btn.dataset.hive;
  const action = btn.dataset.action;
  if (action === 'history') {
    const res = await api(`/api/history?hive=${encodeURIComponent(hive)}`);
    let html = `<div style="padding:8px 12px;font-size:12px;"><strong>Backups for ${hive}:</strong>`;
    if (!res.length) {
      html += '<div class="warn">No backups yet.</div>';
    } else {
      html += '<table style="width:100%;margin-top:6px;border-collapse:collapse;">';
      html += '<tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px">Version</th><th style="text-align:right;padding:4px">Papers</th><th style="text-align:right;padding:4px">Concepts</th><th></th></tr>';
      res.slice(0, 10).forEach(b => {
        html += `<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px">${b.timestamp}</td><td style="text-align:right;padding:4px">${b.papers}</td><td style="text-align:right;padding:4px">${b.concepts}</td>`;
        html += `<td style="padding:4px"><button class="rollback-btn" data-hive="${hive}" data-version="${b.timestamp}" style="background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;color:var(--accent-yellow);font-size:10px;">Rollback</button></td></tr>`;
      });
      html += '</table>';
    }
    html += '</div>';
    const panel = document.getElementById('query-panel');
    document.getElementById('query-explanation').innerHTML = html;
    panel.classList.add('visible');
  } else if (action === 'export') {
    const res = await api(`/api/export?hive=${encodeURIComponent(hive)}&format=jsonld`);
    const blob = new Blob([JSON.stringify(res, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${hive}.jsonld`; a.click();
    URL.revokeObjectURL(url);
    showToast(`Exported ${hive} as JSON-LD`, 'ok');
  } else if (action === 'fetch') {
    const hive = btn.dataset.hive;
    showToast(`Searching arxiv for papers related to "${hive}"...`, 'ok');
    fetch('/api/arxiv-search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: hive, hive, max_results: 10}),
    }).then(r => r.json()).then(res => {
      const added = (res.papers_added || []).length;
      const concepts = (res.concepts_added || []).length;
      if (added) {
        showToast(`Fetched ${added} papers, ${concepts} concepts into "${res.hive}"`, 'ok');
        loadHives();
        if (state.selectedHive) loadHiveGraph(state.selectedHive);
      } else {
        showToast(res.message || 'No new papers found', 'warn');
      }
    }).catch(err => showToast('Fetch failed: ' + err.message, 'err'));
  } else if (action === 'embed') {
    const metric = document.getElementById('metric-select').value;
    showToast(`Generating embeddings for ${hive}...`, 'ok');
    const res = await api(`/api/embed?hive=${encodeURIComponent(hive)}&metric=${encodeURIComponent(metric)}`);
    showToast(`Embedded ${res.embedded || 0} nodes in ${hive} (${res.stats ? res.stats.backends : '?'})`, 'ok');
  }
  });

// Rollback handler
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.rollback-btn');
  if (!btn) return;
  e.stopPropagation();
  const hive = btn.dataset.hive;
  const version = btn.dataset.version;
  if (!confirm(`Rollback hive "${hive}" to version ${version}?`)) return;
  const res = await api(`/api/rollback?hive=${encodeURIComponent(hive)}&version=${encodeURIComponent(version)}`);
  showToast(res.message || 'Rollback done', 'ok');
  document.getElementById('query-panel').classList.remove('visible');
  loadHives();
  if (state.selectedHive) loadHiveGraph(state.selectedHive);
});

// ---- Init ----
Promise.all([
  api('/api/meta-graph'),
  api('/api/hives'),
  api('/api/stats'),
]).then(([metaGraph, hives, stats]) => {
  state.metaGraph = metaGraph;
  state.hives = hives;
  renderMetaGraph();
  loadHives();
}).catch(err => {
  document.getElementById('loading').textContent = 'Error: ' + err.message;
});

// ---- Theme toggle ----
(function() {
  const KEY = 'hivemind-dash-theme';
  const btn = document.getElementById('theme-toggle');
  const html = document.documentElement;

  function setTheme(theme) {
    html.classList.toggle('light', theme === 'light');
    if (btn) btn.innerHTML = theme === 'light' ? '&#9790;' : '&#9788;';
    try { localStorage.setItem(KEY, theme); } catch {}
  }

  const saved = (() => { try { return localStorage.getItem(KEY); } catch { return null; } })();
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  setTheme(saved || (prefersLight ? 'light' : 'dark'));

  if (btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      setTheme(html.classList.contains('light') ? 'dark' : 'light');
    });
  }
})();

// Resize
window.addEventListener('resize', () => {
  if (state.view === 'meta') renderMetaGraph();
  else if (state.view === 'unified') render();
});
</script>
